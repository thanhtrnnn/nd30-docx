# VBFormatter — Wrangler Configuration
# Deploy: npx wrangler pages deploy dist --project-name vbformatter
# Set secret: npx wrangler pages secret put OPENROUTER_API_KEY --project-name vbformatter

name = "vbformatter"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "nd30-jobs"
database_id = "8edd47d8-b2f4-4587-81b2-8b4f5ec49d02"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "nd30-uploads"

[ai]
binding = "AI"
